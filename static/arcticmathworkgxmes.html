<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>College Courses - Standard Library</title>
    <script
      defer
      data-domain="math-punch"
      src="https://stats.senty.com.au/js/script.outbound-links.pageview-props.tagged-events.js"
    ></script>
    <script>
      window.plausible =
        window.plausible ||
        function () {
          (window.plausible.q = window.plausible.q || []).push(arguments);
        };
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      :root {
        --accent: #4da6ff;
      }
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: #070b14;
        color: white;
        height: 100vh;
        overflow: hidden;
      }

      /* STARTUP PICKER */
      #startupOverlay {
        position: fixed;
        inset: 0;
        background: #0b1220;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 5000;
      }
      .startup-box {
        background: #111a2d;
        padding: 40px;
        border-radius: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 20px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        width: 90%;
        max-width: 600px;
      }
      .startup-btn {
        padding: 20px;
        border-radius: 14px;
        cursor: pointer;
        text-align: center;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: 0.25s;
      }
      .startup-btn:hover {
        background: var(--accent);
        transform: translateY(-3px);
        color: #000;
      }
      .count-pill {
        display: block;
        font-size: 12px;
        opacity: 0.6;
        margin-top: 5px;
        font-weight: 400;
      }

      /* TOP BAR */
      .top-bar-container {
        position: fixed;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        width: min(1240px, calc(100% - 32px));
        display: flex;
        flex-direction: column;
        z-index: 20;
        gap: 8px;
      }
      .top-bar-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        width: 100%;
      }
      .search-bar {
        height: 50px;
        min-width: 320px;
        width: 360px;
        padding: 0 18px;
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
      }
      .search-bar input {
        background: none;
        border: none;
        outline: none;
        color: white;
        font-size: 16px;
        width: 100%;
      }
      #top-frame-target {
        width: 728px;
        min-height: 90px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
      }
      #liveCount {
        font-size: 12px;
        background: var(--accent);
        color: #000;
        padding: 2px 8px;
        border-radius: 8px;
        font-weight: 800;
      }
      #sysStatus {
        font-size: 10px;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-weight: bold;
        height: 15px;
        width: 100%;
        padding-left: 4px;
        transition: 0.3s;
      }

      @media (max-width: 1200px) {
        .top-bar-container {
          width: calc(100% - 20px);
        }

        .top-bar-row {
          flex-direction: column;
          align-items: flex-start;
        }

        #top-frame-target {
          width: 100%;
          min-height: 66px;
          justify-content: center;
        }

        .search-bar {
          width: min(420px, 100%);
        }

        #container {
          padding-top: 200px;
        }
      }

      /* SETTINGS */
      #settingsBtn {
        position: fixed;
        top: 20px;
        right: 25px;
        width: 45px;
        height: 45px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 30;
      }
      #settingsOverlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(8px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 2000;
      }
      .settings-panel {
        width: 340px;
        padding: 25px;
        border-radius: 18px;
        background: #101726;
        border: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .setting-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      select {
        background: #1a2438;
        color: white;
        border: 1px solid #333;
        padding: 8px;
        border-radius: 8px;
      }

      /* GRID */
      #container {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-columns: repeat(auto-fill, 220px);
        justify-content: center;
        gap: 18px;
        padding-top: 150px;
        padding-left: 20px;
        padding-right: 20px;
        padding-bottom: 40px;
        overflow-y: auto;
      }
      #container::-webkit-scrollbar {
        display: none;
      }
      .zone-item {
        width: 220px;
        height: 175px;
        border-radius: 18px;
        position: relative;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.06);
        cursor: pointer;
        transition: 0.25s;
        border: 1px solid transparent;
      }
      .zone-item:hover {
        transform: translateY(-6px);
        border-color: var(--accent);
      }
      .zone-item img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.7);
        transition: 0.3s;
      }
      .zone-item:hover img {
        filter: brightness(0.9);
      }
      .zone-item button {
        position: absolute;
        bottom: 12px;
        left: 14px;
        background: none;
        border: none;
        color: white;
        font-size: 15px;
        font-weight: 700;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8);
        pointer-events: none;
        width: 85%;
        text-align: left;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* VIEWER */
      #zoneViewer {
        position: fixed;
        inset: 0;
        background: #000;
        display: none;
        flex-direction: column;
        z-index: 1000;
      }
      #zoneFrame {
        flex: 1;
        border: none;
      }
      #closeBtn {
        position: absolute;
        top: 20px;
        right: 25px;
        width: 45px;
        height: 45px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 1001;
        color: white;
      }
      #loaderBar {
        position: absolute;
        top: 0;
        left: 0;
        width: 0%;
        height: 4px;
        background: var(--accent);
        transition: width 0.2s;
      }

      /* PARTNER POPUP */
      #partnerPopup {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.65);
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        animation: fadeInBg 0.4s ease;
      }
      @keyframes fadeInBg {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .partner-card {
        background: linear-gradient(135deg, #0f1c32, #111a2d);
        border: 1px solid rgba(77, 166, 255, 0.35);
        border-radius: 22px;
        padding: 38px 44px;
        max-width: 420px;
        width: 90%;
        text-align: center;
        box-shadow:
          0 0 60px rgba(77, 166, 255, 0.15),
          0 20px 60px rgba(0, 0, 0, 0.6);
        animation: slideUp 0.45s cubic-bezier(0.22, 1, 0.36, 1);
      }
      @keyframes slideUp {
        from {
          transform: translateY(30px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      .partner-icon {
        width: 62px;
        height: 62px;
        border-radius: 16px;
        background: linear-gradient(135deg, var(--accent), #0066cc);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 26px;
      }
      .partner-card h2 {
        margin: 0 0 10px;
        font-size: 20px;
        font-weight: 700;
        color: white;
        letter-spacing: -0.3px;
      }
      .partner-card p {
        margin: 0 0 28px;
        font-size: 15px;
        color: rgba(255, 255, 255, 0.6);
        line-height: 1.6;
      }
      .partner-card p span {
        color: var(--accent);
        font-weight: 700;
      }
      .partner-close-btn {
        background: var(--accent);
        color: #000;
        border: none;
        border-radius: 12px;
        padding: 12px 32px;
        font-size: 14px;
        font-weight: 800;
        cursor: pointer;
        transition: 0.2s;
        letter-spacing: 0.3px;
      }
      .partner-close-btn:hover {
        opacity: 0.85;
        transform: scale(1.03);
      }
    </style>
    <script src="/assets/js/top-frame.js?v=9"></script>
</head>
  <body>
    <!-- PARTNER CREDIT POPUP -->
    <div id="partnerPopup">
      <div class="partner-card">
        <h2>A Special Thanks</h2>
        <p>Thanks to my partner <span>Sea Bean</span> for the games!</p>
        <button
          class="partner-close-btn"
          onclick="document.getElementById('partnerPopup').style.display = 'none'"
        >
          Let's Go &nbsp;→
        </button>
      </div>
    </div>

    <div id="startupOverlay">
      <div class="startup-box" id="startupBox"></div>
    </div>

    <div class="top-bar-container">
      <div id="sysStatus"></div>
      <div class="top-bar-row">
        <div class="search-bar">
          <i class="fas fa-gamepad" style="opacity: 0.5"></i>
          <input id="searchBar" placeholder="Search library..." oninput="filterZones()" />
          <span id="liveCount">0</span>
        </div>
        <div id="top-frame-target"></div>
      </div>
    </div>

    <div id="settingsBtn" onclick="toggleSettings()">
      <i class="fas fa-gear"></i>
    </div>

    <div id="settingsOverlay" onclick="toggleSettings(event)">
      <div class="settings-panel" onclick="event.stopPropagation()">
        <h3>Settings</h3>
        <div class="setting-row">
          <span>Accent Color</span>
          <input type="color" id="colorPicker" onchange="changeColor(this.value)" />
        </div>
        <div class="setting-row">
          <span>Library Source</span>
          <select id="sourceSelect" onchange="toggleSource(this.value)"></select>
        </div>
      </div>
    </div>

    <div id="container"></div>

    <div id="zoneViewer">
      <div id="closeBtn" onclick="closeViewer()"><i class="fas fa-times"></i></div>
      <div id="loaderBar"></div>
      <iframe id="zoneFrame"></iframe>
    </div>

    <script>
      const CONFIG = {
        LOCAL_KEY: 'saturn_nexus_storage_v14',
      };

      const sources = [
        {
          name: 'GN Math',
          type: 'json',
          json: 'https://cdn.jsdelivr.net/gh/gn-math/assets@latest/zones.json',
          cover: 'https://cdn.jsdelivr.net/gh/gn-math/covers@main/',
          html: 'https://cdn.jsdelivr.net/gh/gn-math/html@main/',
        },
      ];

      let zones = [];
      let currentSource = 0;
      let frameAdObserver = null;

      function cleanDataProcess(rawFiles) {
        const statusEl = document.getElementById('sysStatus');
        statusEl.innerText = 'Indexing Files...';
        const seen = new Set();
        const processed = rawFiles
          .map((file) => {
            let cleanName = file.name
              .replace(/\.html$/i, '')
              .replace(/[-_]/g, ' ')
              .replace(/\b\w/g, (char) => char.toUpperCase());
            if (seen.has(cleanName)) return null;
            seen.add(cleanName);
            return { ...file, name: cleanName };
          })
          .filter((item) => item !== null);
        processed.sort((a, b) => a.name.localeCompare(b.name));
        statusEl.innerText = 'Ready';
        setTimeout(() => (statusEl.innerText = ''), 2000);
        return processed;
      }

      async function init() {
        const savedColor = localStorage.getItem('accentColor') || '#4da6ff';
        document.documentElement.style.setProperty('--accent', savedColor);
        document.getElementById('colorPicker').value = savedColor;

        const startupBox = document.getElementById('startupBox');
        const sourceSelect = document.getElementById('sourceSelect');
        startupBox.innerHTML = '';
        sourceSelect.innerHTML = '';

        sources.forEach((s, i) => {
          const btn = document.createElement('div');
          btn.className = 'startup-btn';
          btn.innerHTML = `<b>${s.name}</b><span class="count-pill" id="count-${i}">Enter Library</span>`;
          btn.onclick = () => chooseStartup(i);
          startupBox.appendChild(btn);

          const opt = document.createElement('option');
          opt.value = i;
          opt.innerText = s.name;
          sourceSelect.appendChild(opt);
        });

        document.getElementById('startupOverlay').style.display = 'flex';
      }

      async function loadSource() {
        const container = document.getElementById('container');
        container.innerHTML =
          "<p style='grid-column:1/-1; text-align:center; opacity:0.5; margin-top:50px;'>Syncing Library...</p>";
        const s = sources[currentSource];

        try {
          if (s.type === 'json') {
            const r = await fetch(s.json);
            zones = await r.json();
          }
          displayZones(zones);
        } catch (err) {
          console.error(err);
          container.innerHTML =
            "<p style='grid-column:1/-1; text-align:center; color:red;'>Sync Failed. Check Internet.</p>";
        }
      }

      function displayZones(list) {
        const container = document.getElementById('container');
        container.innerHTML = '';
        document.getElementById('liveCount').innerText = list.length;
        const s = sources[currentSource];

        list.forEach((z) => {
          const d = document.createElement('div');
          d.className = 'zone-item';
          d.onclick = () => openZone(z);
          const img = document.createElement('img');
          let rc = z.cover || '';
          img.src = rc.includes('{COVER_URL}')
            ? rc.replace('{COVER_URL}', s.cover)
            : s.cover + rc.replace(/^\//, '');
          const b = document.createElement('button');
          b.textContent = z.name;
          d.append(img, b);
          container.appendChild(d);
        });
      }

      function filterZones() {
        const q = document.getElementById('searchBar').value.toLowerCase();
        displayZones(zones.filter((z) => z.name && z.name.toLowerCase().includes(q)));
      }

      function stripSidebarAds(targetDoc) {
        if (!targetDoc) return;

        const adSelectors = [
          '#sidebarad1',
          '#sidebarad2',
          '.sidebar-frame',
          '.sidebar-close',
          '[id*="sidebarad"]',
          '[class*="sidebarad"]',
          'iframe[width="160"][height="600"]',
        ];

        targetDoc.querySelectorAll(adSelectors.join(',')).forEach((el) => el.remove());

        targetDoc.querySelectorAll('style').forEach((styleTag) => {
          const css = (styleTag.textContent || '').toLowerCase();
          if (css.includes('#sidebarad1') || css.includes('#sidebarad2')) styleTag.remove();
        });

        targetDoc.querySelectorAll('script').forEach((scriptTag) => {
          const src = (scriptTag.getAttribute('src') || '').toLowerCase();
          const code = (scriptTag.textContent || '').toLowerCase();
          if (
            src.includes('googletagmanager.com/gtag/js') ||
            code.includes('sidebarad1') ||
            code.includes('sidebarad2') ||
            code.includes('sidebar-frame') ||
            code.includes('allow-popups-to-escape-sandbox')
          ) {
            scriptTag.remove();
          }
        });
      }

      function sanitizeFetchedHtml(html) {
        try {
          const parser = new DOMParser();
          const parsed = parser.parseFromString(html, 'text/html');

          stripSidebarAds(parsed);

          const blockStyle = parsed.createElement('style');
          blockStyle.textContent = `
            #sidebarad1,
            #sidebarad2,
            .sidebar-frame,
            .sidebar-close,
            [id*="sidebarad"],
            [class*="sidebarad"],
            iframe[width="160"][height="600"] {
              display: none !important;
              visibility: hidden !important;
            }
          `;
          parsed.head.appendChild(blockStyle);

          return '<!doctype html>\n' + parsed.documentElement.outerHTML;
        } catch (err) {
          console.warn('HTML sanitize failed, blocking unsafe payload:', err);
          return `<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blocked</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: grid;
        place-items: center;
        background: #090f1d;
        color: #dbe7ff;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .card {
        width: min(560px, 92vw);
        background: #111a2d;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 20px;
      }
      .title { font-weight: 800; margin-bottom: 8px; }
      .muted { opacity: 0.8; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="title">This game page was blocked</div>
      <div class="muted">Strict mode is enabled and this payload could not be sanitized safely.</div>
    </div>
  </body>
</html>`;
        }
      }

      function observeAndStripFrameAds(frameDoc) {
        if (frameAdObserver) frameAdObserver.disconnect();
        if (!frameDoc?.documentElement) return;

        stripSidebarAds(frameDoc);

        frameAdObserver = new MutationObserver(() => stripSidebarAds(frameDoc));
        frameAdObserver.observe(frameDoc.documentElement, {
          childList: true,
          subtree: true,
        });
      }

      function openZone(z) {
        const s = sources[currentSource];
        let finalURL = z.isDirect
          ? z.url
          : z.url.includes('{HTML_URL}')
            ? z.url.replace('{HTML_URL}', s.html)
            : s.html + z.url.replace(/^\//, '');
        document.getElementById('zoneViewer').style.display = 'flex';
        document.getElementById('loaderBar').style.width = '40%';

        fetch(finalURL)
          .then((r) => {
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            return r.text();
          })
          .then((html) => {
            document.getElementById('loaderBar').style.width = '100%';
            const doc = document.getElementById('zoneFrame').contentWindow.document;
            const sanitizedHtml = sanitizeFetchedHtml(html);

            doc.open();
            doc.write(sanitizedHtml);
            doc.close();

            observeAndStripFrameAds(doc);

            setTimeout(() => (document.getElementById('loaderBar').style.width = '0%'), 400);
          })
          .catch((err) => {
            console.warn('Strict mode blocked unsanitized fallback:', err);
            if (frameAdObserver) {
              frameAdObserver.disconnect();
              frameAdObserver = null;
            }
            const doc = document.getElementById('zoneFrame').contentWindow.document;
            doc.open();
            doc.write(`<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Load blocked</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: grid;
        place-items: center;
        background: #090f1d;
        color: #dbe7ff;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .card {
        width: min(620px, 92vw);
        background: #111a2d;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 20px;
      }
      .title { font-weight: 800; margin-bottom: 8px; }
      .muted { opacity: 0.8; line-height: 1.5; }
      code {
        display: inline-block;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        padding: 2px 6px;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="title">Game load blocked in strict mode</div>
      <div class="muted">This page was not loaded directly because unsanitized iframe fallback is disabled.</div>
      <div class="muted" style="margin-top: 10px">URL:<br /><code>${finalURL}</code></div>
    </div>
  </body>
</html>`);
            doc.close();
            document.getElementById('loaderBar').style.width = '0%';
          });
      }

      function chooseStartup(idx) {
        currentSource = idx;
        localStorage.setItem('sourceIndex', idx);
        document.getElementById('sourceSelect').value = idx;
        document.getElementById('startupOverlay').style.display = 'none';
        loadSource();
      }

      function toggleSettings(e) {
        const s = document.getElementById('settingsOverlay');
        if (e && e.target !== s) return;
        s.style.display = s.style.display === 'flex' ? 'none' : 'flex';
      }

      function changeColor(c) {
        document.documentElement.style.setProperty('--accent', c);
        localStorage.setItem('accentColor', c);
      }
      function toggleSource(v) {
        currentSource = parseInt(v);
        localStorage.setItem('sourceIndex', v);
        loadSource();
      }
      function closeViewer() {
        if (frameAdObserver) {
          frameAdObserver.disconnect();
          frameAdObserver = null;
        }
        document.getElementById('zoneViewer').style.display = 'none';
        document.getElementById('zoneFrame').src = 'about:blank';
      }

      window.addEventListener('DOMContentLoaded', init);
    </script>
  </body>
</html>
