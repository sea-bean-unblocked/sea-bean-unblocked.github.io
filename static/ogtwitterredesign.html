<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twitter - Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chirp:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --tw-blue: #1DA1F2;
    --tw-hover: #1a91da;
    --tw-black: #14171A;
    --tw-gray-txt: #657786;
    --tw-border: #E1E8ED;
    --tw-light-bg: #F5F8FA;
    --pure-white: #FFFFFF;
  }
  body {
    font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;
    background: var(--tw-light-bg);
    color: var(--tw-black);
    min-height: 100vh;
    -webkit-font-smoothing: subpixel-antialiased;
  }
  .main-flex-wrapper {
    display: flex;
    min-height: 100vh;
  }
  .blue-branding-side {
    flex: 1.15;
    background: linear-gradient(135deg, #1DA1F2 10%, #0a5f96 90%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
    padding: 50px;
  }
  .floating-decoration {
    position: absolute;
    border-radius: 100%;
    border: 1px solid rgba(255,255,255,0.08);
    animation: move-bg 25s linear infinite;
  }
  .bubble-1 { width: 480px; height: 480px; top: -10%; left: -5%; }
  .bubble-2 { width: 300px; height: 300px; bottom: 5%; right: -2%; }
  @keyframes move-bg {
    0% { transform: translate(0,0) rotate(0); }
    50% { transform: translate(15px, 20px) rotate(5deg); }
    100% { transform: translate(0,0) rotate(0); }
  }
  .promo-area {
    position: relative;
    z-index: 5;
    color: var(--pure-white);
  }
  .big-logo-main {
    width: 75px;
    height: 75px;
    margin-bottom: 40px;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }
  .feature-list {
    list-style: none;
    max-width: 400px;
  }
  .feature-list li {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 25px;
    font-size: 18px;
    font-weight: 500;
  }
  .auth-form-side {
    flex: 0.85;
    background: var(--pure-white);
    display: flex;
    padding: 40px;
    align-items: center;
    justify-content: center;
  }
  .login-box-width {
    width: 100%;
    max-width: 380px;
  }
  .login-box-width h1 {
    font-size: 32px;
    letter-spacing: -1px;
    margin: 15px 0 10px;
  }
  .sub-head {
    color: var(--tw-gray-txt);
    margin-bottom: 35px;
  }
  .input-wrap {
    margin-bottom: 18px;
  }
  .input-wrap label {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--tw-gray-txt);
    margin-bottom: 5px;
  }
  .standard-input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #ccd6dd;
    border-radius: 8px;
    font-size: 16px;
    background-color: #fcfcfc;
  }
  .standard-input:focus {
    outline: none;
    border-color: var(--tw-blue);
    background: #fff;
  }
  .pass-row {
    position: relative;
  }
  .eye-btn {
    position: absolute;
    right: 12px;
    top: 10px;
    background: none;
    border: none;
    cursor: pointer;
    color: #8899a6;
  }
  .flex-options {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin: 20px 0;
  }
  .btn-submit-main {
    width: 100%;
    background: var(--tw-blue);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 30px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-submit-main:hover {
    background: var(--tw-hover);
  }
  .social-btn {
    width: 100%;
    padding: 12px;
    border-radius: 30px;
    margin-bottom: 10px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    border: 1px solid var(--tw-border);
    background: white;
  }
  .btn-black {
    background: #000;
    color: #fff;
    border: none;
  }
  .ui-separator {
    text-align: center;
    margin: 20px 0;
    position: relative;
  }
  .ui-separator::after {
    content: "";
    height: 1px;
    background: var(--tw-border);
    width: 100%;
    position: absolute;
    left: 0;
    top: 50%;
    z-index: 1;
  }
  .ui-separator span {
    background: #fff;
    position: relative;
    z-index: 2;
    padding: 0 10px;
    color: #657786;
  }
  .bottom-links {
    margin-top: 30px;
    font-size: 14px;
    text-align: center;
  }
  .bottom-links a {
    color: var(--tw-blue);
    text-decoration: none;
  }
  .footer-copyright {
    position: absolute;
    bottom: 15px;
    font-size: 11px;
    color: #8899a6;
  }
  @media (max-width: 850px) {
    .main-flex-wrapper { flex-direction: column; }
    .blue-branding-side { flex: none; min-height: 250px; padding: 30px; }
    .feature-list { display: none; }
    .footer-copyright { position: static; margin-top: 20px; }
  }
</style>
</head>
<body>

<div class="main-flex-wrapper">
  <div class="blue-branding-side">
    <div class="floating-decoration bubble-1"></div>
    <div class="floating-decoration bubble-2"></div>
    
    <div class="promo-area">
      <svg class="big-logo-main" viewBox="0 0 24 24" fill="white">
        <path d="M23.643 4.937c-.835.37-1.732.62-2.675.733a4.67 4.67 0 002.048-2.578 9.3 9.3 0 01-2.958 1.13 4.66 4.66 0 00-7.938 4.25 13.229 13.229 0 01-9.602-4.868c-.4.69-.63 1.49-.63 2.342A4.66 4.66 0 003.96 9.824a4.647 4.647 0 01-2.11-.583v.06a4.66 4.66 0 003.737 4.568 4.692 4.692 0 01-2.104.08 4.661 4.661 0 004.352 3.234 9.348 9.348 0 01-5.786 1.995 9.5 9.5 0 01-1.112-.065 13.175 13.175 0 007.14 2.093c8.57 0 13.255-7.098 13.255-13.254 0-.2-.005-.402-.014-.602a9.47 9.47 0 002.323-2.41l.002-.003z"/>
      </svg>
      <ul class="feature-list">
        <li>
          <svg width="24" height="24" stroke="white" stroke-width="2" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          Check out what's going on.
        </li>
        <li>
          <svg width="24" height="24" stroke="white" stroke-width="2" fill="none"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/></svg>
          Talk with the world.
        </li>
        <li>
          <svg width="24" height="24" stroke="white" stroke-width="2" fill="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          See what's trending.
        </li>
      </ul>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="login-box-width">
      <svg width="35" height="35" viewBox="0 0 24 24" fill="#1DA1F2">
        <path d="M23.643 4.937c-.835.37-1.732.62-2.675.733a4.67 4.67 0 002.048-2.578 9.3 9.3 0 01-2.958 1.13 4.66 4.66 0 00-7.938 4.25 13.229 13.229 0 01-9.602-4.868c-.4.69-.63 1.49-.63 2.342A4.66 4.66 0 003.96 9.824a4.647 4.647 0 01-2.11-.583v.06a4.66 4.66 0 003.737 4.568 4.692 4.692 0 01-2.104.08 4.661 4.661 0 004.352 3.234 9.348 9.348 0 01-5.786 1.995 9.5 9.5 0 01-1.112-.065 13.175 13.175 0 007.14 2.093c8.57 0 13.255-7.098 13.255-13.254 0-.2-.005-.402-.014-.602a9.47 9.47 0 002.323-2.41l.002-.003z"/>
      </svg>
      <h1>Log in to Twitter</h1>
      <p class="sub-head">Enter your details below to continue.</p>

      <button class="social-btn">
        <img width="18" src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="">
        Sign in with Google
      </button>
      <button class="social-btn btn-black">
        Sign in with Apple
      </button>

      <div class="ui-separator"><span>or</span></div>

      <form id="loginForm">
        <div class="input-wrap">
          <label>Phone, email, or username</label>
          <input type="text" class="standard-input" id="user_id">
        </div>
        <div class="input-wrap">
          <label>Password</label>
          <div class="pass-row">
            <input type="password" class="standard-input" id="user_pass">
            <button type="button" class="eye-btn" onclick="toggleVisibility()">
              <svg id="eye_svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="flex-options">
          <label style="cursor:pointer"><input type="checkbox"> Remember me</label>
          <a href="#" style="color:#1DA1F2; text-decoration:none">Forgot password?</a>
        </div>

        <button type="submit" class="btn-submit-main">Log in</button>
      </form>

      <div class="bottom-links">
        Don't have an account? <a href="#">Sign up</a>
      </div>

      <div class="footer-copyright">
        &copy; 2026 Twitter, Inc.
      </div>
    </div>
  </div>
</div>

<script>
  function toggleVisibility() {
    var p = document.getElementById('user_pass');
    var s = document.getElementById('eye_svg');
    if (p.type === 'password') {
      p.type = 'text';
      s.style.color = '#1DA1F2';
    } else {
      p.type = 'password';
      s.style.color = '#8899a6';
    }
  }

  document.getElementById('loginForm').onsubmit = function(e) {
    e.preventDefault();
    console.log('Attempting login...');
  };
</script>

</body>
</html>
