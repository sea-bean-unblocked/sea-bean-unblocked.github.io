<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arctic 1.0</title>
    <script>
      (function () {
        let isTop = false;
        try {
          isTop = window.self === window.top;
        } catch {
          isTop = false;
        }

        if (!isTop) return;

        window.plausible =
          window.plausible ||
          function () {
            (window.plausible.q = window.plausible.q || []).push(arguments);
          };

        const tag = document.createElement('script');
        tag.defer = true;
        tag.dataset.domain = 'math-punch';
        tag.src = 'https://stats.senty.com.au/js/script.outbound-links.pageview-props.tagged-events.js';
        document.head.appendChild(tag);
      })();
    </script>
    <link rel="stylesheet" href="/assets/css/app.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .container {
        max-width: 500px;
        margin: 0 auto;
        padding: 20px;
        background-color: #1f2937;
      }
      body {
        background-color: #111827;
      }
    </style>
</head>
  <body class="flex items-center justify-center h-screen">
    <div class="container shadow-lg rounded-lg p-6 text-center" style="width: 500px">
      <h1 class="text-3xl font-bold text-white mb-4" style="font-family: poppins">Welcome</h1>
      <p class="text-lg text-gray-300">Type A URL Or Search Above</p>
    </div>
    <!-- External ad script removed -->
  </body>
</html>
