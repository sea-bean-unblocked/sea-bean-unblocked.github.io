    <style>
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }

      #loading-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .spinner {
        width: 44px;
        height: 44px;
        animation: spinner-y0fdc1 2s infinite ease;
        transform-style: preserve-3d;
      }

      .spinner > div {
        background-color: rgba(0, 77, 255, 0.2);
        height: 100%;
        position: absolute;
        width: 100%;
        border: 2px solid #004dff;
      }

      .spinner div:nth-of-type(1) {
        transform: translateZ(-22px) rotateY(180deg);
      }

      .spinner div:nth-of-type(2) {
        transform: rotateY(-270deg) translateX(50%);
        transform-origin: top right;
      }

      .spinner div:nth-of-type(3) {
        transform: rotateY(270deg) translateX(-50%);
        transform-origin: center left;
      }

      .spinner div:nth-of-type(4) {
        transform: rotateX(90deg) translateY(-50%);
        transform-origin: top center;
      }

      .spinner div:nth-of-type(5) {
        transform: rotateX(-90deg) translateY(50%);
        transform-origin: bottom center;
      }

      .spinner div:nth-of-type(6) {
        transform: translateZ(22px);
      }

      @keyframes spinner-y0fdc1 {
        0% {
          transform: rotate(45deg) rotateX(-25deg) rotateY(25deg);
        }

        50% {
          transform: rotate(45deg) rotateX(-385deg) rotateY(25deg);
        }

        100% {
          transform: rotate(45deg) rotateX(-385deg) rotateY(385deg);
        }
      }

      #mastery-banner {
        position: fixed;
        top: 52px;
        right: 20px;
        width: 728px;
        height: 90px;
        margin: 0;
        padding: 0;
        overflow: hidden;
        z-index: 950;
        display: flex;
        align-items: flex-start;
        justify-content: flex-end;
        line-height: 0;
        font-size: 0;
      }

      #mastery-banner iframe {
        display: block;
        width: 728px;
        height: 90px;
        margin: 0;
        padding: 0;
        border: 0;
      }

      .iframe-container {
        margin-top: 0 !important;
      }

      .iframe-container iframe {
        top: 142px;
        bottom: auto;
        height: calc(100vh - 142px);
      }

      #menu {
        margin-top: 132px;
      }

      #sidebar {
        padding-top: 146px;
      }

      @media (max-width: 767px) {
        #mastery-banner {
          top: 52px;
          right: auto;
          left: 50%;
          transform: translateX(-50%);
          width: 320px;
          height: 50px;
        }

        #mastery-banner iframe {
          width: 320px;
          height: 50px;
        }

        .iframe-container {
          margin-top: 0 !important;
        }

        .iframe-container iframe {
          top: 102px;
          height: calc(100vh - 102px);
        }

        #menu {
          margin-top: 92px;
        }

        #sidebar {
          padding-top: 106px;
        }
      }
    </style>

    <script>
      (function () {
        const banner = document.getElementById('mastery-banner');
        if (!banner) return;

        const isMobile = window.matchMedia('(max-width: 767px)').matches;
        const unit = isMobile
          ? { key: '9fce6c42f0388b8e0dbd8388eb490ac7', width: 320, height: 50 }
          : { key: '45a8c2f1517f61cbabc897106f47084b', width: 728, height: 90 };

        function normalizeBannerFrame() {
          const iframe = banner.querySelector('iframe');
          if (!iframe) return;

          iframe.style.display = 'block';
          iframe.style.width = unit.width + 'px';
          iframe.style.height = unit.height + 'px';
          iframe.style.margin = '0';
          iframe.style.padding = '0';
          iframe.style.border = '0';

          function normalizeInner() {
            try {
              const doc = iframe.contentDocument || iframe.contentWindow.document;
              if (!doc) return;
              if (doc.documentElement) {
                doc.documentElement.style.margin = '0';
                doc.documentElement.style.padding = '0';
                doc.documentElement.style.overflow = 'hidden';
              }
              if (doc.body) {
                doc.body.style.margin = '0';
                doc.body.style.padding = '0';
                doc.body.style.overflow = 'hidden';
              }
            } catch (e) {}
          }

          iframe.addEventListener('load', normalizeInner, { once: true });
          normalizeInner();
        }

        const observer = new MutationObserver(normalizeBannerFrame);
        observer.observe(banner, { childList: true, subtree: true });

        window.setTimeout(function () {
          const optionsScript = document.createElement('script');
          optionsScript.type = 'text/javascript';
          optionsScript.text = `
            atOptions = {
              'key': '${unit.key}',
              'format': 'iframe',
              'height': ${unit.height},
              'width': ${unit.width},
              'params': {}
            };
          `;

          const invokeScript = document.createElement('script');
          invokeScript.type = 'text/javascript';
          invokeScript.src = `https://www.highperformanceformat.com/${unit.key}/invoke.js`;

          banner.appendChild(optionsScript);
          banner.appendChild(invokeScript);
          normalizeBannerFrame();
        }, 5000);
      })();

      startInterval();
    </script>
    <script>
      if ('true' === localStorage.getItem('loadingScreenDisabled'))
        ((document.getElementById('loading-screen').style.display = 'none'),
          (document.body.style.overflow = ''));
      else {
        ((document.getElementById('loading-screen').style.display = 'flex'),
          (document.body.style.overflow = 'hidden'),
          window.addEventListener('load', function () {
            const e = document.getElementById('loading-screen');
            (e.classList.add('fade-out'),
              setTimeout(function () {
                ((e.style.display = 'none'), (document.body.style.overflow = ''));
              }, 500));
          }));
      }
    </script>
