<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arctic 1.0 | Code Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --arctic-blue: #0f172a; /* Deep Midnight */
            --arctic-light: #f8fafc; /* Crisp White */
            --arctic-accent: #38bdf8; /* Ice Blue */
            --arctic-border: #1e293b;
        }
        body, html { height: 100%; margin: 0; overflow: hidden; background: var(--arctic-blue); color: var(--arctic-light); font-family: 'Inter', sans-serif; }
        
        /* Layout Grid */
        .app-container { display: grid; grid-template-rows: 45px 1fr 200px; height: 100vh; }
        .main-view { display: grid; grid-template-columns: 1fr 400px; overflow: hidden; }
        
        /* UI Components */
        .navbar { background: #020617; border-bottom: 1px solid var(--arctic-border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        .sidebar-icon { width: 50px; background: #020617; border-right: 1px solid var(--arctic-border); display: flex; flex-col; align-items: center; padding-top: 20px; }
        .terminal { background: #020617; border-top: 4px solid var(--arctic-border); padding: 10px; font-family: monospace; font-size: 12px; overflow-y: auto; color: #94a3b8; }
        
        #editor-container { background: #0f172a; height: 100%; }
        #preview-container { background: white; border-left: 2px solid var(--arctic-accent); position: relative; }
        
        .btn-run { background: var(--arctic-accent); color: var(--arctic-blue); font-weight: bold; padding: 4px 15px; border-radius: 4px; transition: all 0.2s; font-size: 12px; }
        .btn-run:hover { opacity: 0.8; transform: scale(1.05); }
        
        .status-bar { height: 25px; background: var(--arctic-accent); color: var(--arctic-blue); position: fixed; bottom: 0; width: 100%; font-size: 11px; display: flex; align-items: center; padding: 0 10px; z-index: 100; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="navbar">
            <div class="flex items-center gap-4">
                <span style="color: var(--arctic-accent); font-weight: 800; letter-spacing: 1px;">ARCTIC 1.0</span>
                <span class="text-xs opacity-50">index.js</span>
            </div>
            <button id="run-btn" class="btn-run">RUN SESSION</button>
        </header>

        <div class="main-view">
            <div id="editor-container"></div>
            <div id="preview-container">
                <div id="preview-overlay" class="absolute inset-0 flex items-center justify-center bg-slate-900 text-sm text-slate-400 italic">
                    Waiting for Arctic Engine...
                </div>
                <iframe id="localhost-view" class="w-full h-full border-none hidden"></iframe>
            </div>
        </div>

        <div class="terminal" id="terminal-out">
            <div class="text-sky-400 mb-2">[System] Arctic Environment Initialized. Ready for input.</div>
        </div>
    </div>

    <div class="status-bar">
        <span>● Connected</span>
        <span class="ml-4">UTF-8</span>
        <span class="ml-4">Node.js Virtual Environment</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
