<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>

    <!-- Instant redirect -->
    <meta http-equiv="refresh" content="0; url=https://sea-math.github.io/">

    <script>
        // Backup redirect (works if meta tag fails)
        window.location.href = "https://sea-math.github.io/";
    </script>
</head>
<body>
    <p>If you are not redirected, <a href="https://sea-math.github.io/">click here</a>.</p>
</body>
</html>
